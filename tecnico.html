<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduSupport - Painel da TI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Um pequeno ajuste no CSS apenas para esta tela ter a tabela ocupando 100% do espaço */
        .painel-listagem-ti {
            background-color: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            width: 100%;
        }
        .header-ti {
            background-color: #343a40; /* Cabeçalho mais escuro para diferenciar da visão da Diretora */
        }
    </style>
</head>
<body>

    <header class="header-ti">
        <h1>EduSupport SMED - Central de TI</h1>
        <p>Visão do Técnico: Gestão de Chamados</p>
    </header>

    <main class="container">
        <section class="painel-listagem-ti">
            <h2>Fila de Atendimentos</h2>
            
            <table id="tabela-chamados">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Título</th>
                        <th>Status</th>
                        <th>Categoria</th>
                        <th>Ações (TI)</th>
                    </tr>
                </thead>
                <tbody id="lista-chamados-body">
                    <tr>
                        <td colspan="5">Carregando fila de chamados...</td>
                    </tr>
                </tbody>
            </table>

            <div class="paginacao">
                <button id="btn-anterior" disabled>« Anterior</button>
                <span id="info-pagina">Página 1 de 1</span>
                <button id="btn-proximo" disabled>Próxima »</button>
            </div>
        </section>
    </main>

    <script src="tecnico.js"></script>
</body>
</html>
